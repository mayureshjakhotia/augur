<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUGUR · The AI that keeps score</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              rune: ["Cinzel", "serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
            colors: {
              void: "#07060f",
              abyss: "#0e0b1e",
              panel: "#15112b",
              arcane: "#a855f7",
              ether: "#22d3ee",
              gold: "#fbbf24",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: "Inter", system-ui, sans-serif; }
      .font-rune { font-family: "Cinzel", serif; letter-spacing: 0.02em; }

      /* Arcane background: layered radial glows + starfield */
      body {
        background:
          radial-gradient(900px 600px at 18% -5%, rgba(168, 85, 247, 0.18), transparent 60%),
          radial-gradient(800px 600px at 100% 0%, rgba(34, 211, 238, 0.12), transparent 55%),
          radial-gradient(700px 700px at 50% 120%, rgba(168, 85, 247, 0.10), transparent 60%),
          #07060f;
        background-attachment: fixed;
      }
      #stars {
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background-image:
          radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.7), transparent),
          radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.5), transparent),
          radial-gradient(1.5px 1.5px at 80% 20%, rgba(199,210,254,0.6), transparent),
          radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.5), transparent),
          radial-gradient(1px 1px at 90% 55%, rgba(167,139,250,0.6), transparent),
          radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.4), transparent);
        background-repeat: repeat;
        animation: twinkle 6s ease-in-out infinite alternate;
      }
      @keyframes twinkle { from { opacity: .5 } to { opacity: .9 } }
      @keyframes float-orb { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
      @keyframes pulse-aura { 0%,100% { opacity:.55 } 50% { opacity:1 } }
      @keyframes spin-slow { to { transform: rotate(360deg) } }
      .aura { animation: pulse-aura 1.6s ease-in-out infinite; }
      .orb-float { animation: float-orb 4s ease-in-out infinite; }
      .spin-slow { animation: spin-slow 18s linear infinite; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: #2a2150; border-radius: 4px; }
      .glow-text { text-shadow: 0 0 18px rgba(168,85,247,0.55); }
      @keyframes ball-glow {
        0%,100% { filter: drop-shadow(0 0 10px rgba(168,85,247,0.7)) drop-shadow(0 0 22px rgba(34,211,238,0.35)); transform: translateY(0) rotate(-3deg); }
        50% { filter: drop-shadow(0 0 20px rgba(168,85,247,1)) drop-shadow(0 0 40px rgba(34,211,238,0.6)); transform: translateY(-5px) rotate(3deg); }
      }
      .crystal-ball { display:inline-block; font-size: 2.6rem; line-height:1; animation: ball-glow 3.2s ease-in-out infinite; }
      @keyframes verse-in {
        from { opacity: 0; transform: translateY(10px) scale(0.98); filter: blur(6px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .verse-reveal { animation: verse-in 1s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes stamp-in {
        0% { opacity: 0; transform: scale(2.4) rotate(-18deg); filter: blur(8px); }
        60% { opacity: 1; transform: scale(0.85) rotate(6deg); filter: blur(0); }
        100% { opacity: 1; transform: scale(1) rotate(-6deg); }
      }
      .stamp-in { animation: stamp-in 0.6s cubic-bezier(.2,.9,.3,1.4) both; }

      /* ── Doctor-Strange-style sparking portal ── */
      @keyframes portal-spin { to { transform: rotate(360deg); } }
      .portal { position: relative; width: 220px; height: 220px; }
      .portal-ring {
        position: absolute; inset: 0; border-radius: 50%;
        background: conic-gradient(from 0deg,
          transparent 0 4%, #fde68a 6%, #f59e0b 9%, #fb923c 12%, transparent 16% 48%,
          #a855f7 52%, #c084fc 55%, transparent 60% 92%, #fbbf24 95%, transparent 100%);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
        mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
        filter: drop-shadow(0 0 6px #f59e0b) drop-shadow(0 0 14px rgba(245,158,11,.5));
        animation: portal-spin 2.4s linear infinite;
      }
      .portal-ring.r2 { inset: 16px; animation-duration: 3.6s; animation-direction: reverse;
        filter: drop-shadow(0 0 5px #c084fc) drop-shadow(0 0 12px rgba(168,85,247,.5)); }
      .portal-ring.r3 { inset: 34px; animation-duration: 1.8s;
        filter: drop-shadow(0 0 6px #fcd34d) drop-shadow(0 0 16px rgba(251,191,36,.55)); }
      .portal-ring.r4 { inset: 54px; animation-duration: 5s; animation-direction: reverse; opacity:.8; }
      .portal-core {
        position: absolute; inset: 64px; border-radius: 50%;
        background: radial-gradient(circle, rgba(10,8,20,.2), #07060f 72%);
        box-shadow: inset 0 0 30px rgba(168,85,247,.5), 0 0 30px rgba(245,158,11,.25);
        display: flex; align-items: center; justify-content: center;
      }

      /* ── Mirror-dimension: faint rotating mandala behind everything ── */
      #mandala {
        position: fixed; inset: -20%; z-index: 0; pointer-events: none; opacity: .05;
        background:
          repeating-conic-gradient(from 0deg at 50% 50%, #a855f7 0deg 2deg, transparent 2deg 14deg),
          repeating-radial-gradient(circle at 50% 50%, rgba(34,211,238,.4) 0 1px, transparent 1px 46px);
        animation: portal-spin 120s linear infinite;
      }
    </style>
  </head>
  <body class="text-slate-100">
    <div id="mandala"></div>
    <div id="stars"></div>
    <div id="root" style="position: relative; z-index: 1"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
