name: MJSked Android build

# Builds an installable debug APK for the MJSked app on every push that touches
# it. The workflow runs on GitHub's Android-capable runners (the dev container
# has no Android SDK), so this is how a real, installable artifact is produced.

on:
  push:
    branches: ["**"]
    paths:
      - "MJSked/**"
      - ".github/workflows/mjsked-android.yml"
  pull_request:
    paths:
      - "MJSked/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MJSked
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mjsked-debug-apk
          path: MJSked/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
